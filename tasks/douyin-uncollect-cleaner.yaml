# 抖音取消收藏清理任务配置
id: "douyin_uncollect_cleaner"
name: "抖音取消收藏清理"
description: "每天定时清理 7 天前的取消收藏记录"
enabled: true

# Cron 表达式列表：每天 10:00 执行
crons:
  - "0 10 * * *"   # 每天 10:00

# 项目配置
project_path: "F:/github/person_project/douyin-collector"
venv_path: "F:/github/person_project/douyin-collector/.venv"
working_dir: "F:/github/person_project/douyin-collector"

# 执行配置
script: "clean_uncollected.py"

# 环境变量（可选）
env:
  PLAYWRIGHT_BROWSERS_PATH: 'C:\Users\Administrator\AppData\Local\ms-playwright'

# 重试配置
max_retries: 0
retry_delay: 60